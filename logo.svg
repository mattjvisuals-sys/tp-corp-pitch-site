<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;display=swap');
    </style>
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0  0.8 0 0 0 0  0.3 0 0 0 0  0 0 0 0.35 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3"/>
      <stop offset="30%" style="stop-color:#C9A55A"/>
      <stop offset="60%" style="stop-color:#B8943F"/>
      <stop offset="100%" style="stop-color:#D4B96E"/>
    </linearGradient>
    <linearGradient id="gold-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0E2B8"/>
      <stop offset="50%" style="stop-color:#C9A55A"/>
      <stop offset="100%" style="stop-color:#A07830"/>
    </linearGradient>
  </defs>

  <!-- TINY -->
  <text x="200" y="50" text-anchor="middle"
        font-family="'Dancing Script', cursive"
        font-size="54" font-weight="700"
        fill="url(#gold-gradient)" filter="url(#gold-glow)"
        letter-spacing="4">Tiny</text>

  <!-- POCKETS -->
  <text x="200" y="105" text-anchor="middle"
        font-family="'Dancing Script', cursive"
        font-size="54" font-weight="700"
        fill="url(#gold-gradient)" filter="url(#gold-glow)"
        letter-spacing="3">Pockets</text>

  <!-- Decorative underline flourish -->
  <path d="M 95 112 Q 150 120 200 114 Q 250 108 305 116"
        stroke="url(#gold-highlight)" stroke-width="1.5" fill="none" opacity="0.5"
        stroke-linecap="round"/>
</svg>