<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@500&amp;display=swap');
    </style>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8943F"/>
      <stop offset="25%" style="stop-color:#C9A55A"/>
      <stop offset="50%" style="stop-color:#F5ECCE"/>
      <stop offset="75%" style="stop-color:#D4B96E"/>
      <stop offset="100%" style="stop-color:#B8943F"/>
    </linearGradient>
  </defs>

  <!-- Border frame -->
  <rect x="1" y="1" width="478" height="58" rx="0" ry="0"
        fill="none" stroke="#8a7340" stroke-width="1"/>

  <!-- TINY POCKETS -->
  <text x="200" y="38" text-anchor="middle"
        font-family="'Playfair Display', serif"
        font-size="18" font-weight="700"
        letter-spacing="6"
        fill="url(#gold-gradient)">TINY POCKETS</text>

  <!-- Divider line -->
  <line x1="370" y1="16" x2="370" y2="44" stroke="#8a7340" stroke-width="1" opacity="0.6"/>

  <!-- MUSIC -->
  <text x="420" y="36" text-anchor="middle"
        font-family="'Inter', sans-serif"
        font-size="10" font-weight="500"
        letter-spacing="4"
        fill="#8a7340">MUSIC</text>
</svg>